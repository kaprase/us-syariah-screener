# ============================================================
# GitHub Actions Workflow: US Syariah Telegram Bot
# Berjalan 24 jam setiap hari kerja untuk menerima perintah
# ============================================================

name: US Syariah Telegram Bot

on:
  schedule:
    # Jalankan setiap hari kerja jam 00:00 UTC (07:00 WIB)
   - cron: '0 12 * * 1-5'
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # ~5.8 jam, batas GitHub Actions

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install yfinance pandas numpy requests

      - name: Jalankan US Syariah Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python us_telegram_bot.py
