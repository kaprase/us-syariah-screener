name: US Syariah Stock Screener

on:
  schedule:
  - cron: '0 13 * * 1-5'
  workflow_dispatch:

jobs:
  screening:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install yfinance pandas numpy requests

      - name: Jalankan US Syariah Screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ls -la
          python us_syariah_screener.py          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python us_syariah_screener.py
          ALERT_TICKERS: ${{ secrets.ALERT_TICKERS }}


